version: 2
updates:
  # GitHub Actions 依赖
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 根工程 npm 依赖（pnpm）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # examples 子包 npm 依赖（pnpm workspace）
  - package-ecosystem: "npm"
    directory: "/examples"
    schedule:
      interval: "weekly"
